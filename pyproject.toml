packages = [
    "acl_loader",
    "clear",
    "clear.plugins",
    "clear.plugins.auto",
    "config",
    "config.plugins",
    "config.plugins.auto",
    "connect",
    "consutil",
    "counterpoll",
    "crm",
    "debug",
    "generic_config_updater",
    "dump",
    "dump.plugins",
    "pfcwd",
    "sfputil",
    "ssdutil",
    "pfc",
    "psuutil",
    "flow_counter_util",
    "fdbutil",
    "fwutil",
    "pcieutil",
    "pddf_fanutil",
    "pddf_psuutil",
    "pddf_thermalutil",
    "pddf_ledutil",
    "syslog_util",
    "rcli",
    "show",
    "show.interfaces",
    "show.plugins",
    "show.plugins.auto",
    "sonic_installer",
    "sonic_installer.bootloader",
    "sonic_package_manager",
    "sonic_package_manager.service_creator",
    "tests",
    "undebug",
    "utilities_common",
    "watchdogutil",
    "sonic_cli_gen",
]


[tool.pytest.ini_options]
testpaths = ["tests"]

# Override for uv to use with Bazel
