[build-system]
requires = ["setuptools", "setuptools-scm", "wheel", "pytest-runner", "fastentrypoints"]
build-backend = "setuptools.build_meta"

[project]
name = "sonic-utilities"
version = "1.2"
requires-python = ">=3.11"
description = "Command-line utilities for SONiC"
license = "Apache-2.0"
authors = [
    { name = "SONiC Team", email = "linuxnetdev@microsoft.com" },
]
maintainers = [
    { name = "Joe LeVeque", email = "jolevequ@microsoft.com" },
]
keywords = [
    "sonic",
    "SONiC",
    "utilities",
    "command",
    "line",
    "cli",
    "CLI",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: System Administrators",
    "Natural Language :: English",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3.7",
    "Topic :: Utilities",
]
dependencies = [
    "bcrypt>=3.2.2",
    "click>=8.0, <8.2",
    "cryptography>=3.3.2",
    "urllib3>=2",
    "click-log>=0.3.2",
    "docker>=4.4.4",
    "docker-image-py>=0.1.10",
    "filelock>=3.0.12",
    "enlighten>=1.8.0",
    "ijson>=3.2.3",
    "ipaddress>=1.0.23",
    "protobuf",
    "jinja2>=2.11.3",
    "jsondiff>=1.2.0",
    "jsonpatch>=1.32.0",
    "jsonpointer>=1.9",
    "m2crypto>=0.31.0",
    "natsort>=8.0",
    "netaddr>=0.8.0",
    "netifaces>=0.10.7",
    "paramiko>=3.0",
    "pexpect>=4.8.0",
    "semantic-version>=2.8.5",
    "prettyprinter>=0.18.0",
    "pyroute2>=0.7.7",
    "requests>=2.25.0",
    "tabulate==0.9.0",
    "toposort==1.6",
    "www-authenticate==0.9.2",
    "xmltodict==0.12.0",
    "lazy-object-proxy",
    "six>=1.16.0",
    "scp==0.14.5",
    "sonic-config-engine",
    "sonic-platform-common",
    "sonic-py-common",
    "sonic-yang-mgmt",
    # Required by Bazel rules_py, to build sdist-only wheels
    "build",
    "setuptools",
    # Required for backwards compatibility
    "mock",
]

[project.urls]
Homepage = "https://github.com/Azure/sonic-utilities"

[project.optional-dependencies]
testing = [
    "pyfakefs",
    "responses",
    "pytest",
    "mockredispy>=2.9.3",
    "deepdiff>=6.2.2",
]

# These deps are installed in the container, but not resolved with the rest of dependencies.
container = [
    "pyangbind==0.8.1",
]

[project.scripts]
acl-loader = "acl_loader.main:cli"
config = "config.main:config"
connect = "connect.main:connect"
consutil = "consutil.main:consutil"
counterpoll = "counterpoll.main:cli"
crm = "crm.main:cli"
debug = "debug.main:cli"
dump = "dump.main:dump"
filter_fdb_entries = "fdbutil.filter_fdb_entries:main"
pfcwd = "pfcwd.main:cli"
sfputil = "sfputil.main:cli"
ssdutil = "ssdutil.main:ssdutil"
pfc = "pfc.main:cli"
psuutil = "psuutil.main:cli"
fwutil = "fwutil.main:cli"
pcieutil = "pcieutil.main:cli"
pddf_fanutil = "pddf_fanutil.main:cli"
pddf_psuutil = "pddf_psuutil.main:cli"
pddf_thermalutil = "pddf_thermalutil.main:cli"
pddf_ledutil = "pddf_ledutil.main:cli"
rexec = "rcli.rexec:cli"
rshell = "rcli.rshell:cli"
show = "show.main:cli"
sonic-clear = "clear.main:cli"
sonic-installer = "sonic_installer.main:sonic_installer"
sonic_installer = "sonic_installer.main:sonic_installer"
sonic-package-manager = "sonic_package_manager.main:cli"
spm = "sonic_package_manager.main:cli"
undebug = "undebug.main:cli"
watchdogutil = "watchdogutil.main:watchdogutil"
sonic-cli-gen = "sonic_cli_gen.main:cli"

[tool.setuptools.package-data]
generic_config_updater = [
    "gcu_services_validator.conf.json",
    "gcu_field_operation_validators.conf.json",
]
show = ["aliases.ini"]
sonic_installer = ["aliases.ini"]
tests = [
    "acl_input/*",
    "db_migrator_input/*.json",
    "db_migrator_input/config_db/*.json",
    "db_migrator_input/appl_db/*.json",
    "counterpoll_input/*",
    "mock_tables/*.py",
    "mock_tables/*.json",
    "mock_tables/asic0/*.json",
    "mock_tables/asic1/*.json",
    "mock_tables/asic2/*.json",
    "filter_fdb_input/*",
    "pfcwd_input/*",
    "wm_input/*",
    "ecn_input/*",
    "dump_input/*",
]

[tool.setuptools]
script-files = [
